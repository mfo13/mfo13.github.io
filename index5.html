<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste SessionStorage</title>

<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
    }

    button {
        margin-top: 15px;
        padding: 8px 16px;
        cursor: pointer;
    }

    textarea {
        width: 100%;
        height: 300px;
        margin-top: 20px;
        font-family: Consolas, monospace;
        font-size: 14px;
    }

    #status {
        margin-top: 15px;
        font-weight: bold;
    }
</style>

</head>
<body>

<h2>Teste de SessionStorage</h2>

<p>Selecione um arquivo texto:</p>

<input type="file" id="arquivo" accept=".txt">

<div id="status">Nenhum arquivo carregado.</div>

<button id="mostrar">Mostrar conteúdo armazenado</button>

<textarea id="saida" readonly></textarea>

<script>

const inputArquivo = document.getElementById("arquivo");
const status = document.getElementById("status");
const saida = document.getElementById("saida");

inputArquivo.addEventListener("change", function () {

    const arquivo = this.files[0];

    if (!arquivo)
        return;

    const reader = new FileReader();

    reader.onload = function (e) {

        const texto = e.target.result;

        sessionStorage.setItem("arquivoTexto", texto);

        status.textContent =
            "Arquivo armazenado na sessão (" +
            texto.length +
            " caracteres).";
    };

    reader.readAsText(arquivo, "UTF-8");
});

document.getElementById("mostrar").addEventListener("click", function () {

    const texto = sessionStorage.getItem("arquivoTexto");

    if (texto === null) {
        alert("Nenhum arquivo foi carregado.");
        return;
    }

    saida.value = texto;

});

</script>

</body>
</html>
